###############################
# DOCKER COMPOSE - SERVIÇOS
###############################

services:  # Lista de containers que serão criados

    ###############################
    # SERVIÇO NGINX
    ###############################
    nginx:
        container_name: nginx                 # Nome do container
        build:                                # Como construir a imagem
            context: ./requirements/nginx     # Diretório onde está o Dockerfile
            dockerfile: Dockerfile            # Nome do Dockerfile (pode ser omitido se for "Dockerfile")
        image: nginx:inception                # Nome e tag da imagem resultante
        env_file: .env                        # Ficheiro com variáveis de ambiente
        ports:                                # Portas expostas (HOST:CONTAINER)
            - "443:443"                       # HTTPS exposto ao host
        networks:                             # Redes a que o container pertence
            - inception
        volumes:                              # Volumes montados dentro do container
            - wordpress:/var/www/html         # Diretório onde o Nginx lê os ficheiros do WordPress
        restart: on-failure                   # Reinicia o container apenas se falhar
    ###############################
    # SERVIÇO MARIADB
    ###############################
    mariadb:
        container_name: mariadb
        build:
            context: ./requirements/mariadb
            dockerfile: Dockerfile
        image: mariadb:inception
        env_file: .env                        # Variáveis como DB_NAME, DB_USER...
        networks:
            - inception
        volumes:
            - db:/var/lib/mysql               # Onde ficam as bases de dados
        restart: on-failure

    ###############################
    # SERVIÇO WORDPRESS (PHP-FPM)
    ###############################
    wordpress:
        container_name: wordpress
        build:
            context: ./requirements/wordpress
            dockerfile: Dockerfile
        image: wordpress:inception
        env_file: .env                        # Variáveis como WP_ADMIN, WP_PASSWORD...
        networks:
            - inception
        volumes:
            - wordpress:/var/www/html         # Código e uploads do WordPress
        restart: on-failure

###############################
# DEFINIÇÃO DA NETWORK
###############################
networks:
    inception:
        driver: bridge                        # Rede local para comunicação interna entre containers

###############################
# DEFINIÇÃO DOS VOLUMES
###############################

###############################
# EXPLICAÇÃO SOBRE VOLUMES
###############################
# Volumes são locais onde os dados ficam guardados de forma permanente,
# mesmo que os containers sejam destruídos ou recriados.
# 
# Como os containers são temporários, tudo o que estiver dentro deles desaparece ao serem apagados.
# Por isso os volumes são ESSENCIAIS para guardar:
#   - Bases de dados (MariaDB)
#   - Ficheiros do WordPress (uploads, plugins, temas)
#   - Qualquer dado que não deve ser perdido após restart/rebuild
#
# Neste projeto, usamos “bind mounts”: pastas reais no host ligadas ao container.
# Assim consegues ver e gerir os ficheiros diretamente em ./data/*
###############################
volumes:

    ###############################
    # VOLUME DA BASE DE DADOS
    ###############################
    db:
        driver: local
        driver_opts:
            type: none                        # Indica ao Docker que é um bind mount
            o: bind                           # 'bind' = apontar para uma pasta real do host
            device: ./data/db                 # Diretório no host onde ficam os ficheiros da BD

    ###############################
    # VOLUME DO WORDPRESS
    ###############################
    wordpress:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: ./data/wordpress          # Diretório no host onde ficam ficheiros da instalação WP
